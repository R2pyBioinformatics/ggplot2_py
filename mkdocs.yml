site_name: ggplot2_py
site_description: Python port of R's ggplot2 package
use_directory_urls: false

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo

nav:
  - Home: index.md
  - API Reference: api.md
  - Tutorials:
    - Getting Started: tutorials/ggplot2.ipynb
    - Geom Gallery: tutorials/geoms_gallery.ipynb

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
  - mkdocs-jupyter:
      include_source: true
      execute: false

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
