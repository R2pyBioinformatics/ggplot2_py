id: ggplot2_py.theme_light
import_path: ggplot2_py.theme_light
execution_class: builder
intent:
  - "apply a light-grey themed plot with subtle chrome"
  - "a softer alternative to theme_bw — light grey lines instead of black"
description: |
  Complete Theme with light-grey axis lines and panel border on a white
  background — visually similar to `theme_linedraw` but with greys
  instead of pure black, producing a softer look that still keeps a
  visible panel boundary. Same builder contract as `theme_bw`.
parameters:
  - name: base_size
    type: float
    required: false
    default: 11
  - name: base_family
    type: str
    required: false
    default: ""
  - name: header_family
    type: Optional[str]
    required: false
    default: null
  - name: base_line_size
    type: Optional[float]
    required: false
    default: null
  - name: base_rect_size
    type: Optional[float]
    required: false
    default: null
  - name: ink
    type: str
    required: false
    default: black
  - name: paper
    type: str
    required: false
    default: white
  - name: accent
    type: str
    required: false
    default: "#3366FF"
returns_kind: new_object
returns_type: Theme
next:
  - ggplot2_py.theme
examples:
  - "p + theme_light()"
tested_on: "ggplot2-python@4.0.2.9000"
