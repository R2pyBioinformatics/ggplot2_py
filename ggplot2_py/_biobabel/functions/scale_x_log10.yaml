id: ggplot2_py.scale_x_log10
import_path: ggplot2_py.scale_x_log10
execution_class: builder
intent:
  - "log10 x axis"
  - "data spans multiple orders of magnitude"
description: |
  Equivalent to scale_x_continuous(transform=transform_log10()) with breaks/labels
  appropriate to log space. Use whenever x values span ≥2 orders of magnitude.
parameters:
  - name: breaks
    type: "callable | list | None"
    required: false
    default: null
    description: "Defaults to breaks_log()."
  - name: labels
    type: "callable | None"
    required: false
    default: null
    description: "Defaults to label_log()."
  - name: limits
    type: "tuple[float, float] | None"
    required: false
    default: null
returns_kind: new_object
returns_type: Scale
next: []
failure_fixes:
  - when: "warning: zeros or negatives removed"
    suggest:
      - "log10 is undefined at <=0; filter rows where x>0, or use pseudo_log_trans()"
examples:
  - "p + scale_x_log10()"
tested_on: "ggplot2-python@4.0.2.9000"
