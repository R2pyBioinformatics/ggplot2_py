id: ggplot2_py.aes
import_path: ggplot2_py.aes
execution_class: stateless
intent:
  - "specify aesthetic mappings"
  - "bind data columns to visual properties (x, y, color, fill, size, shape, alpha, linetype, group, weight, label)"
description: |
  Return a Mapping that binds aesthetic *names* (x, y, color/colour, fill, size,
  shape, alpha, linetype, group, weight, label, ...) to column names in the
  current data frame.

  Python signature is exactly `aes(x=None, y=None, **kwargs)`. Only `x` and `y`
  can be passed positionally; every other aesthetic must be a keyword argument
  passing through `**kwargs`. Columns are referenced by **string**, not by
  bare identifier — Python has no NSE.

  Aliases: `color`/`colour`, `col`, `bg`, `fg`, `pch`, `cex`, `lty`, `lwd`,
  `srt`, `adj`, `min`, `max` are all standardised at parse time. Passing the
  same aesthetic under two aliases simultaneously (e.g. both `color=` and
  `colour=`) raises.
parameters:
  - name: x
    type: "str | None"
    required: false
    default: null
    description: "Column name to map to the x aesthetic. Can be positional."
  - name: y
    type: "str | None"
    required: false
    default: null
    description: "Column name to map to the y aesthetic. Can be positional."
  - name: "**kwargs"
    type: "str (one column name per aesthetic)"
    required: false
    default: null
    description: |
      Every other aesthetic — color/colour, fill, size, shape, alpha, linetype,
      group, weight, label, ... — must be passed as keyword argument with the
      column name as a string value. Same accepted set as R ggplot2.
requires: {}
writes: {}
returns_kind: value
returns_type: Mapping
next:
  - ggplot2_py.ggplot
  - ggplot2_py.geom_point
failure_fixes:
  - when: "passed a bare identifier (NameError in Python before aes() runs)"
    suggest:
      - "Wrap column names in quotes: aes(x='displ'), not aes(x=displ)."
    explanation: "Python evaluates `displ` in local scope and NameError-s before aes() is even called. R's NSE doesn't exist here."
  - when: "Duplicate aesthetic … passed as both 'color' and 'colour'"
    suggest:
      - "Pick exactly one alias — `color=` or `colour=` — not both."
    explanation: "aes.py standardises aliases; supplying the same aesthetic under two alias names raises at standardise_aes_names time."
  - when: "TypeError: aes() takes at most 2 positional arguments (3 given)"
    suggest:
      - "Only x and y can be positional. For color/size/etc., use keyword args: aes(x='displ', y='hwy', color='class')."
examples:
  - "aes(x='displ', y='hwy')"
  - "aes('displ', 'hwy')  # positional form, same as above"
  - "aes(x='displ', y='hwy', color='class', size='cyl')"
tested_on: "ggplot2-python@4.0.2.9000"
