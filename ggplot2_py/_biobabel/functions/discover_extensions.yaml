id: ggplot2_py.discover_extensions
import_path: ggplot2_py.discover_extensions
execution_class: stateless
intent:
  - "scan installed packages for ggplot2_py entry-point extensions and register them"
  - "make 'mygeom' resolvable as a string in layer(geom='mygeom') from third-party packages"
description: |
  Scan `importlib.metadata.entry_points()` for entries in the
  `ggplot2_py.{geoms,stats,positions,scales,coords,facets}` groups, load
  each class, and register it under both its declared name and a
  CamelCase variant on the corresponding base class's `_registry`. After
  discovery, the class is reachable via string lookup inside `layer(...)`,
  `scale_*`, etc.

  **For extension package authors**: declare an entry point in your
  `pyproject.toml`::

      [project.entry-points."ggplot2_py.geoms"]
      mygeom = "mypkg.geoms:MyGeom"

      [project.entry-points."ggplot2_py.stats"]
      mystat = "mypkg.stats:MyStat"

  Then `from ggplot2_py import *` will auto-call `discover_extensions()`
  at import time (see `ggplot2_py/__init__.py:987-989`). Users can then
  write `layer(geom='mygeom', stat='mystat')` without importing your
  package directly.

  Idempotent: classes already in the registry (e.g. via `__init_subclass__`)
  are skipped. Entry points that fail to load emit a warning but do not
  raise — partial extension ecosystems still import cleanly.

  Returns a dict `{group: [discovered_names]}` for the entry points
  successfully registered in this call. The function caches in
  `_discovered` so repeated calls do not double-register.

  Note: this is auto-called at `ggplot2_py` import. Users RARELY need to
  call it manually — only relevant if a plugin was installed mid-session
  (then `importlib.reload(ggplot2_py)` is a saner approach).
parameters: []
requires: {}
writes: {}
returns_kind: value
returns_type: "dict[str, list[str]]"
next:
  - ggplot2_py.layer
failure_fixes:
  - when: "your geom isn't found via layer(geom='myname')"
    suggest:
      - "Check pyproject entry point group name (must be ggplot2_py.geoms, plural) and that the value points to a Class, not a function. Run `discover_extensions()` manually to surface any load warnings."
  - when: "warning: ggplot2_py: failed to load extension 'X'"
    suggest:
      - "The entry-point target raised on import. Fix the underlying ImportError; ggplot2_py won't block its own import for one bad plugin."
  - when: "extension installed after ggplot2_py imported"
    suggest:
      - "Restart the interpreter, or call discover_extensions() manually. The discovery cache is process-global."
  - when: "name collision with built-in"
    suggest:
      - "Built-ins are registered first (via __init_subclass__); plugins with the same name are SKIPPED, not overwritten. Rename your plugin entry point."
examples:
  - "# auto-runs at import time:\nimport ggplot2_py  # → discover_extensions() runs once"
  - "from ggplot2_py import discover_extensions\nfound = discover_extensions()\n# {'ggplot2_py.geoms': ['mygeom'], ...}"
  - "# pyproject.toml:\n# [project.entry-points.'ggplot2_py.geoms']\n# mygeom = 'mypkg.geoms:MyGeom'"
tested_on: "ggplot2-python@4.0.2.9000"
