id: ggplot2_py.scale_y_reverse
import_path: ggplot2_py.scale_y_reverse
execution_class: builder
intent:
  - "reverse the direction of the y axis"
description: |
  y-axis mirror of scale_x_reverse; see scale_x_reverse for behaviour /
  failure modes. Common use: ranking plots (rank 1 at top), depth profiles
  (zero at top, deeper below).
parameters:
  - name: "**kwargs"
    type: "any"
    required: false
    default: null
returns_kind: new_object
returns_type: Scale
next:
  - ggplot2_py.scale_x_reverse
failure_fixes:
  - when: "axis didn't flip — coord_cartesian added afterwards reset it"
    suggest:
      - "Either pass limits through this scale only, or reverse the coord tuple: coord_cartesian(ylim=(high, low))."
examples:
  - "p + scale_y_reverse()"
  - "p + scale_y_reverse(name='Depth (m)')"
tested_on: "ggplot2-python@4.0.2.9000"
