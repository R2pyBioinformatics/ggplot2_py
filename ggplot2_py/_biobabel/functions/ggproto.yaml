id: ggplot2_py.ggproto
import_path: ggplot2_py.ggproto
execution_class: stateless
intent:
  - "dynamically construct a Geom/Stat/Position/Coord subclass at runtime"
  - "port R ggproto(...) code verbatim into Python"
description: |
  Dynamically construct a `GGProto` subclass. The R idiom
  `ggproto("MyGeom", Geom, draw_panel=..., default_aes=...)` is preserved
  here as a near-identical call.

  IMPORTANT: in idiomatic ggplot2-python, you should prefer a plain
  `class MyGeom(Geom): ...` definition. The `ggproto()` factory exists to
  ease R-to-Python porting and to support cases where the parent class is
  only known at runtime (e.g. plugin loaders). Both forms produce the
  same kind of object — a class with class-level slots — and both are
  consumed identically by `layer()`.

  Returns a CLASS, not an instance. The class is then either:
    (a) passed to `layer(geom=MyGeom, ...)` directly, or
    (b) instantiated via `MyGeom()` and then passed.

  See concept `ggplot2_py.extension_class_hierarchy` for the full base
  class catalogue and override patterns.
parameters:
  - name: _class
    type: str
    required: true
    default: null
    description: "Name for the new class (becomes `__name__`)."
  - name: _inherit
    type: "type[GGProto] | None"
    required: false
    default: null
    description: "Parent class. Defaults to `GGProto`. Pass `Geom`, `Stat`, `Position`, `Coord`, `Facet`, or any of their subclasses."
  - name: "**members"
    type: Any
    required: false
    default: null
    description: |
      Attributes and methods. Functions whose first parameter is `self`
      become bound instance methods. Non-function values become class
      slots (e.g. `required_aes=("x", "y")`, `default_aes=aes(colour="black")`).
requires: {}
writes: {}
returns_kind: value
returns_type: "type[GGProto]"
next:
  - ggplot2_py.layer
  - ggplot2_py.ggproto_parent
failure_fixes:
  - when: "want to add new methods after class creation"
    suggest:
      - "Use a plain `class MyGeom(Geom): ...` block. ggproto() is for cases where parent is dynamic; the Python class statement is more readable for static parents."
  - when: "need to call the parent's method from inside an override"
    suggest:
      - "Use `ggproto_parent(Parent, self).method(...)`. Plain `super()` also works for class-statement subclasses."
  - when: "TypeError: ggproto() missing required argument: '_class'"
    suggest:
      - "First positional arg is the class name string: ggproto('MyGeom', Geom, ...)."
  - when: "TypeError when passing a regular function expecting (data, params) without `self`"
    suggest:
      - "GGProto methods need `self` as first arg even when not used: define `def draw_panel(self, data, params, ...)`."
examples:
  - "MyGeom = ggproto('MyGeom', Geom, required_aes=('x','y'), draw_panel=lambda self, data, panel_params, coord: ...)"
  - "MyStat = ggproto('MyStat', Stat, compute_group=staticmethod(lambda data, scales: data))"
  - "# Idiomatic Python alternative — prefer this form:\n# class MyGeom(Geom):\n#     required_aes = ('x', 'y')\n#     def draw_panel(self, data, panel_params, coord): ..."
tested_on: "ggplot2-python@4.0.2.9000"
