id: ggplot2_py.theme_get
import_path: ggplot2_py.theme_get
execution_class: stateless
intent:
  - "inspect the currently-active global default Theme"
  - "snapshot the current theme so it can be restored later"
  - "build a partial override on top of whatever the user currently has"
description: |
  Return the Theme object currently registered as `ggplot2_py`'s
  module-level default. This is the theme that every `ggplot(...)` will
  inherit when no `+ theme_*()` is added per-plot.

  `theme_get()` returns the LIVE reference, not a deep copy — mutating
  the returned object would mutate the global default. In practice the
  Theme constructors never mutate after construction, so this is rarely
  a footgun, but if you want a safe snapshot to restore later, capture
  the reference and just pass it back through `theme_set(prev)`:

      prev = theme_get()
      try:
          theme_set(theme_bw())
          ...  # work that needs bw globally
      finally:
          theme_set(prev)

  Returns `None` only when the default has never been initialized (rare;
  the package sets `theme_grey()` at import time).
parameters: []
returns_kind: same_object
returns_type: Optional[Theme]
next:
  - ggplot2_py.theme_set
  - ggplot2_py.theme_update
failure_fixes:
  - when: "User expected a fresh copy and mutated the return value"
    suggest:
      - "theme_get() returns the live global reference. Add via `+ theme(...)` per-plot, or call theme_set(...) explicitly."
  - when: "Returned None"
    suggest:
      - "The module-level default was cleared (e.g. reset_theme_settings(reset_current=True) before a default was installed). Call theme_set(theme_grey()) to re-seed."
examples:
  - "current = theme_get()"
  - "prev = theme_get(); theme_set(theme_bw()); ...; theme_set(prev)"
tested_on: "ggplot2-python@4.0.2.9000"
