id: ggplot2_py.ggplot_add
import_path: ggplot2_py.ggplot_add
execution_class: builder
intent:
  - "implement the + operator hook so a new object type composes with ggplot()"
  - "register a custom type with the singledispatch dispatcher"
description: |
  Generic dispatch entry point for the `+` operator on a `GGPlot`. Python
  port of R's S3 generic `ggplot_add()`. When you write `p + obj`, the
  GGPlot's `__add__` calls `ggplot_add(obj, p)`, which forwards to the
  `update_ggplot` `singledispatch` generic. The slot the object lands in
  (layers, scales, theme, coord, facet, labels, mapping, data) is
  determined by `type(obj)`.

  **For extension authors**: this is THE hook to make a new object type
  composable with `ggplot() + your_object`. There are two ways:

  1. Register your type on `update_ggplot` (preferred — open generic)::

        from ggplot2_py.plot import update_ggplot

        @update_ggplot.register(MyType)
        def _add_my_type(obj, plot, object_name=""):
            # mutate/clone plot, then return it
            plot = plot._clone()
            plot.layers.append(obj.as_layer())
            return plot

  2. Subclass and override — only useful if your object IS a plot-like
     thing (e.g. patchwork's `Patchwork` extends GGPlot).

  Built-in registered types (see plot.py): `Layer`, `Scale`, `Theme`,
  `Coord`, `Facet`, `Guides`, `Labels`, `Mapping`, `pd.DataFrame`,
  `list` (each item is added in order), `None` (no-op).

  Patchwork-python registers `Patchwork`/`PatchworkPlot` against
  `update_ggplot` so that `ggplot(...) + patchwork(...)` works
  symmetrically. See concepts `ggplot2_py.plus_accumulation` and
  `ggplot2_py.extension_class_hierarchy`.
parameters:
  - name: obj
    type: Any
    required: true
    default: null
    description: "Object to add. Must be a registered type, or one of the built-ins."
  - name: plot
    type: GGPlot
    required: true
    default: null
    description: "Plot to extend. Conventionally cloned, mutated, then returned (do NOT mutate in place if you care about referential transparency)."
  - name: object_name
    type: str
    required: false
    default: "''"
    description: "Source-code name of the object — used in error messages (e.g. 'theme_minimal'). Usually injected by GGPlot.__add__ for nicer errors."
requires: {}
writes: {}
returns_kind: new_object
returns_type: GGPlot
next:
  - ggplot2_py.ggplot_build
  - ggplot2_py.ggplotGrob
failure_fixes:
  - when: "Cannot add `MyType` to a ggplot object"
    suggest:
      - "Register a handler via @update_ggplot.register(MyType). See plot.py:1126."
    explanation: "The default fallback raises with this message. Without a registration, your type is invisible to `+`."
  - when: "Cannot add ggproto objects together. Did you forget to add this object to a ggplot object?"
    suggest:
      - "You're trying `GeomX() + GeomY()`. Geoms compose into a GGPlot, not into each other: `ggplot(df) + geom_x() + geom_y()`."
  - when: "Cannot add `foo` to a ggplot object. Did you forget to add parentheses, as in `foo()`?"
    suggest:
      - "You passed the factory function itself instead of calling it: `+ geom_point` should be `+ geom_point()`."
  - when: "want symmetric `MyType + ggplot(...)` to work"
    suggest:
      - "Define `__add__` on your type that dispatches when the RHS is a GGPlot — or use `__radd__`. ggplot2_py only handles GGPlot.__add__ (LHS=plot)."
examples:
  - "from ggplot2_py.plot import update_ggplot\n@update_ggplot.register(MyAnnotation)\ndef _add(obj, plot, object_name=''):\n    plot.layers.append(obj.to_layer())\n    return plot"
  - "ggplot_add(theme_minimal(), my_plot)  # equivalent to my_plot + theme_minimal()"
  - "ggplot_add([geom_point(), theme_bw()], my_plot)  # list is added item-by-item"
tested_on: "ggplot2-python@4.0.2.9000"
