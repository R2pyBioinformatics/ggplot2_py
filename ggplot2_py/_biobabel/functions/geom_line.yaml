id: ggplot2_py.geom_line
import_path: ggplot2_py.geom_line
execution_class: builder
intent:
  - "connect points by a line (time series, trend lines)"
description: |
  Connect observations sorted by x with a line segment. For unsorted x,
  reach for geom_path() instead.
parameters:
  - name: mapping
    type: Mapping
    required: false
    default: null
  - name: data
    type: DataFrame
    required: false
    default: null
  - name: linetype
    type: str
    required: false
    default: solid
returns_kind: new_object
returns_type: Layer
next:
  - ggplot2_py.geom_point
  - ggplot2_py.facet_wrap
  - ggplot2_py.scale_x_log10
failure_fixes:
  - when: "lines zigzag instead of going left-to-right"
    suggest:
      - "Sort data by x before plotting, or use geom_path() which preserves row order"
  - when: "want separate lines per group"
    suggest:
      - "Map color, linetype, or group to a grouping column in aes()"
examples:
  - "ggplot(econ, aes(x='date', y='unemploy')) + geom_line()"
tested_on: "ggplot2-python@4.0.2.9000"
