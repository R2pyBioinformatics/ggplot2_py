id: ggplot2_py.scale_y_sqrt
import_path: ggplot2_py.scale_y_sqrt
execution_class: builder
intent:
  - "square-root y axis"
description: |
  y-axis mirror of scale_x_sqrt; see scale_x_sqrt for behaviour / failure
  modes. Forwards `**kwargs` to scale_y_continuous with
  `transform=transform_sqrt()` as the default.
parameters:
  - name: "**kwargs"
    type: "any"
    required: false
    default: null
returns_kind: new_object
returns_type: Scale
next:
  - ggplot2_py.scale_x_sqrt
failure_fixes:
  - when: "warning: sqrt produced NaN — negative input"
    suggest:
      - "sqrt is undefined for y<0; filter negatives or pick a sign-preserving transform."
examples:
  - "p + scale_y_sqrt()"
tested_on: "ggplot2-python@4.0.2.9000"
