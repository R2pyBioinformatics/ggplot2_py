id: ggplot2_py.scale_x_date
import_path: ggplot2_py.scale_x_date
execution_class: builder
intent:
  - "Date-typed (day-resolution) x axis"
  - "format day/month/year tick labels via strftime"
description: |
  Specialised x scale for `datetime.date` / `pd.Timestamp` (date) data.
  Internally `scale_x_continuous` with `transform=transform_date()`. Provides
  three date-aware shortcuts in addition to the generic `breaks`/`labels`:

  - `date_breaks="1 month"` — string interval (`"day"`, `"week"`, `"month"`,
    `"year"`, `"3 months"`, etc.). Mutually exclusive with `breaks=`.
  - `date_labels="%b %Y"` — strftime format string. Mutually exclusive with
    `labels=`.
  - `date_minor_breaks="1 week"` — same syntax as `date_breaks`, for minor
    grid.

  The `limits=` filtering pitfall (see `ggplot2_py.scale_x_continuous`)
  applies here too: limits given as `(date(2020,1,1), date(2020,12,31))`
  drops rows outside the window before stats. Use `coord_cartesian(xlim=...)`
  for pure zoom.
parameters:
  - name: name
    type: "str | Waiver | None"
    required: false
    default: null
  - name: breaks
    type: "array-like | callable | None | Waiver"
    required: false
    default: null
  - name: date_breaks
    type: "str | None"
    required: false
    default: null
    description: 'Interval string e.g. "1 month", "2 weeks", "1 year". Overrides `breaks`.'
  - name: labels
    type: "array-like | callable | None | Waiver"
    required: false
    default: null
  - name: date_labels
    type: "str | None"
    required: false
    default: null
    description: 'strftime format e.g. "%b %Y", "%Y-%m-%d". Overrides `labels`.'
  - name: minor_breaks
    type: "array-like | callable | None | Waiver"
    required: false
    default: null
  - name: date_minor_breaks
    type: "str | None"
    required: false
    default: null
  - name: limits
    type: "tuple[date, date] | None"
    required: false
    default: null
  - name: expand
    type: "array-like | Waiver"
    required: false
    default: null
  - name: oob
    type: "callable | None"
    required: false
    default: null
  - name: guide
    type: "str | Guide | Waiver"
    required: false
    default: null
  - name: position
    type: str
    required: false
    default: bottom
  - name: sec_axis
    type: "AxisSecondary | Waiver | None"
    required: false
    default: null
returns_kind: new_object
returns_type: Scale
next:
  - ggplot2_py.scale_x_datetime
failure_fixes:
  - when: "TypeError or weird breaks because the x column is a string, not date"
    suggest:
      - "Cast first: df['day'] = pd.to_datetime(df['day']).dt.date — scale_x_date expects date-typed values."
  - when: "date_labels= shows literal '%b' or other format-string codes"
    suggest:
      - "Wrong format string. Use Python strftime codes: %Y year, %m month-num, %b month-abbrev, %d day."
  - when: "date_breaks string raises 'invalid interval'"
    suggest:
      - 'Use "<n> <unit>" with unit ∈ {sec, min, hour, day, week, month, year}. Example: "1 month", "3 weeks".'
  - when: "geom_smooth flat after limits=(start, end)"
    suggest:
      - "limits= drops out-of-range rows; for visual window only, use coord_cartesian(xlim=(start, end))."
examples:
  - "p + scale_x_date(date_breaks='1 month', date_labels='%b %Y')"
  - "p + scale_x_date(date_breaks='1 year', date_labels='%Y', date_minor_breaks='3 months')"
tested_on: "ggplot2-python@4.0.2.9000"
