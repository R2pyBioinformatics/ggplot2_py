id: ggplot2_py.draw_key_path
import_path: ggplot2_py.draw_key_path
execution_class: plot
intent:
  - "draw the legend key for path/line geoms (a horizontal segment)"
description: |
  Render a horizontal segment as the legend key glyph. Used by
  `geom_line`, `geom_path`, `geom_segment`, `geom_smooth` (line-only),
  `geom_density` (line variant), and any custom geom whose visual is
  primarily a stroke.

  Reads `colour`/`fill` (colour preferred, fill fallback), `alpha`,
  `linewidth`, `linetype`, `lineend` for the segment style.

  See `ggplot2_py.draw_key_point` for the full `draw_key_*(data, params,
  size) -> Grob` protocol documentation.
parameters:
  - name: data
    type: "dict[str, Any]"
    required: true
    default: null
    description: "Single-row aesthetic dict: colour, fill, alpha, linewidth, linetype."
  - name: params
    type: "dict[str, Any]"
    required: true
    default: null
    description: "Layer params (reads `lineend`, default 'butt')."
  - name: size
    type: Any
    required: false
    default: null
requires: {}
writes: {}
returns_kind: value
returns_type: Grob
next:
  - ggplot2_py.guide_legend
failure_fixes:
  - when: "legend segment is invisible"
    suggest:
      - "data['colour'] is None and data['fill'] is None. Set a default in your Geom's default_aes for at least one of them."
examples:
  - "class MyLineGeom(Geom):\n    draw_key = draw_key_path"
tested_on: "ggplot2-python@4.0.2.9000"
