id: ggplot2_py.scale_y_log10
import_path: ggplot2_py.scale_y_log10
execution_class: builder
intent:
  - "log10 y axis"
description: |
  y-axis mirror of scale_x_log10; see scale_x_log10 for behaviour / failure
  modes (zeros & negatives produce a warning + dropped rows; use
  `pseudo_log_trans` if data crosses zero). Forwards `**kwargs` to
  scale_y_continuous with `transform=transform_log10()` as the default.
parameters:
  - name: "**kwargs"
    type: "any"
    required: false
    default: null
returns_kind: new_object
returns_type: Scale
next:
  - ggplot2_py.scale_x_log10
failure_fixes:
  - when: "warning: zeros or negatives removed"
    suggest:
      - "log10 is undefined at <=0; filter rows where y>0, or use pseudo_log_trans()."
examples:
  - "p + scale_y_log10()"
tested_on: "ggplot2-python@4.0.2.9000"
