id: ggplot2_py.scale_color_viridis_d
import_path: ggplot2_py.scale_color_viridis_d
execution_class: builder
intent:
  - "discrete viridis color scale for categorical data"
  - "colorblind-safe palette for factor levels"
description: |
  **Discrete** viridis color scale — the `_d` suffix means discrete. Picks `n`
  evenly-spaced colors from a viridis option, where `n` equals the number of
  unique levels in the data.

  Sibling of `scale_color_viridis_c` (continuous). Picking the wrong suffix is
  the most common viridis bug: `_d` for factor / string columns, `_c` for
  numeric. With `_d` on numeric data you typically get an error; with `_c` on
  a factor you get an error too. Always reason about the *column dtype* first.

  Wraps the discrete `pal_viridis` palette factory from scales — see
  `scales.Palette` for the discrete-vs-continuous contract.
parameters:
  - name: option
    type: "str"
    required: false
    default: "D"
    description: |
      Viridis variant. 'A' magma, 'B' inferno, 'C' plasma, 'D' viridis,
      'E' cividis, 'F' rocket, 'G' mako, 'H' turbo.
  - name: begin
    type: "float"
    required: false
    default: 0.0
    description: "Sample start (0–1). Trim the dark end."
  - name: end
    type: "float"
    required: false
    default: 1.0
    description: "Sample end (0–1). Trim the bright end."
  - name: direction
    type: "int"
    required: false
    default: 1
    description: "+1 = dark→bright, -1 = reverse."
  - name: alpha
    type: "float"
    required: false
    default: 1.0
    description: "Color alpha applied uniformly."
  - name: name
    type: "str | None"
    required: false
    default: null
    description: "Legend title."
  - name: breaks
    type: "list[str] | callable | None"
    required: false
    default: null
    description: "Levels to display in the legend, in order."
  - name: labels
    type: "list | dict | callable | None"
    required: false
    default: null
    description: "Legend label overrides."
  - name: limits
    type: "list[str] | None"
    required: false
    default: null
    description: "Subset / re-order the levels included; levels not listed are dropped."
  - name: na_value
    type: "str"
    required: false
    default: "grey50"
    description: "Color for NA. Python uses `na_value=` (not R's `na.value=`)."
  - name: aesthetics
    type: "str | list[str]"
    required: false
    default: "colour"
    description: "'color' / 'colour' are aliases."
requires: {}
writes: {}
returns_kind: new_object
returns_type: Scale
next: []
failure_fixes:
  - when: "Error: Continuous value supplied to discrete scale"
    suggest:
      - "Your column is numeric — use `scale_color_viridis_c()` (the `_c` suffix)."
    explanation: "_d refuses numeric columns. _c vs _d is the #1 viridis bug — match the suffix to the column dtype."
  - when: "only one color shown / all points the same color"
    suggest:
      - "Your data has only one unique level. Verify with `df[col].nunique()`."
      - "Or the column was passed unquoted: ensure `aes(color='group')` not `aes(color=group)`."
  - when: "TypeError: got an unexpected keyword argument 'na.value'"
    suggest:
      - "Use `na_value=` — Python underscores, not R dots."
  - when: "colors hard to distinguish with many levels"
    suggest:
      - "Viridis is sequential — for >6 unrelated categories prefer `scale_color_brewer(type='qual', palette='Set2')` or `scale_color_manual()`."
examples:
  - "p + scale_color_viridis_d()  # factor column on color="
  - "p + scale_color_viridis_d(option='plasma', end=0.85)"
tested_on: "ggplot2-python@4.0.2.9000"
