id: ggplot2_py.set_last_plot
import_path: ggplot2_py.set_last_plot
execution_class: stateless
intent:
  - "register a plot as the 'current' plot for ggsave() / last_plot() to read"
description: |
  Store `plot` in the module-level global `_last_plot` (in
  `ggplot2_py.plot`). `ggsave()` and `last_plot()` read this global to
  pick up "the most recently displayed plot" when no explicit plot is
  given.

  **WARNING — process-global side effect.** This mutates module-level
  state in `ggplot2_py.plot`. It is NOT recorded as `writes:` in this
  YAML because biobabel `writes:` describes adata-slot mutations, not
  module globals. The mutation is real:
    - Threading: not thread-safe (last call wins).
    - Subprocesses / notebooks: each fresh interpreter starts with None.
    - Sequence-dependence: ggsave() relying on last_plot() depends on
      the most recent `set_last_plot` having been your plot.

  Typically called implicitly:
    - `print_plot(p)` calls `set_last_plot(p)` automatically.
    - Some IDE backends call it after each `plot.show()`.

  Extension authors who provide their own display function (e.g.
  patchwork's custom `__repr__`) should call `set_last_plot(p)` so
  `ggsave()` without an explicit plot continues to work.

  Note: `last_plot` is just `get_last_plot`; they share the global.
parameters:
  - name: plot
    type: GGPlot
    required: true
    default: null
    description: "Plot to record as the 'current' plot."
requires: {}
writes: {}
returns_kind: none
returns_type: None
next:
  - ggplot2_py.ggsave
  - ggplot2_py.last_plot
failure_fixes:
  - when: "ggsave() with no plot arg saves the wrong plot"
    suggest:
      - "Call set_last_plot(p) explicitly before ggsave(), or pass the plot directly: ggsave(filename, plot=p). The 'last_plot' global is fragile across notebook cells and threads."
  - when: "running in a multi-process script — last_plot() returns None in worker"
    suggest:
      - "Module globals don't cross fork/spawn boundaries cleanly. Pass plots explicitly into the worker; don't rely on set_last_plot from the parent."
  - when: "want to clear the last plot"
    suggest:
      - "set_last_plot(None) — None is accepted and clears the slot. Subsequent last_plot() returns None."
examples:
  - "set_last_plot(p)  # explicit; ggsave('out.png') will save p"
  - "# usually implicit:\nprint_plot(p)  # also calls set_last_plot(p)"
  - "set_last_plot(None)  # clear"
tested_on: "ggplot2-python@4.0.2.9000"
