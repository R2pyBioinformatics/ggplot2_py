id: ggplot2_py.as_labeller
import_path: ggplot2_py.as_labeller
execution_class: stateless
intent:
  - "coerce a string/dict/callable into the canonical labeller(labels, multi_line) signature"
  - "extension authors writing facet label_* helpers should funnel through this"
description: |
  Convert any "labeller-shaped" input into the canonical labeller callable
  signature `labeller(labels: dict[str, list[str]], multi_line: bool=True) -> list[str]`.
  This is the contract `facet_wrap` and `facet_grid` expect from
  `labeller=` arguments.

  Accepted input forms:
    - `callable` — returned unchanged (assumed to follow the contract).
    - `str` — looked up in `_LABELLER_REGISTRY`: one of `"label_value"`,
      `"label_both"`, `"label_context"`, `"label_parsed"`, `"label_bquote"`.
      Unknown strings raise `ValueError`.
    - `dict` — built into a lookup-table labeller: each value is mapped
      through the dict, with un-matched keys passed through `label_value`.

  Anything else raises `TypeError`.

  **For extension authors writing custom `label_X` helpers** (e.g.
  `label_percent`, `label_scientific`): make sure your callable accepts
  `(labels: dict, multi_line: bool=True)` and returns `list[str]`. Then
  users can either pass it directly to `facet_wrap(labeller=my_fn)` or
  wrap it via `as_labeller(my_fn)`.

  Mirrors R `facet-labeller.R:284-299`. Note: R's behaviour for non-dict
  non-callable arguments is more lenient (vectorised); the Python port
  raises explicitly.
parameters:
  - name: x
    type: "str | dict | Callable"
    required: true
    default: null
    description: "Labeller spec. String name, dict lookup table, or labeller callable."
requires: {}
writes: {}
returns_kind: value
returns_type: Callable
next:
  - ggplot2_py.facet_wrap
  - ggplot2_py.facet_grid
failure_fixes:
  - when: "ValueError: Unknown labeller: 'X'"
    suggest:
      - "Use one of label_value / label_both / label_context / label_parsed / label_bquote, or pass a callable directly."
  - when: "TypeError: Cannot coerce X to a labeller"
    suggest:
      - "Pass a string, dict, or callable. Lists/tuples are not labellers — convert to a dict first."
  - when: "facet labels render as raw values despite passing a labeller"
    suggest:
      - "Make sure the callable has signature (labels, multi_line=True) -> list[str]. A `lambda x: f'{x}'` won't work; the input is a dict-of-lists."
  - when: "dict-form labeller works for some levels but not others"
    suggest:
      - "Unmatched keys fall back to label_value (raw display). Make the dict exhaustive or wrap in a defaultdict before passing."
examples:
  - "as_labeller('label_both')  # returns label_both"
  - "as_labeller({'drv4': 'four-wheel', 'drvf': 'front'})  # lookup-table labeller"
  - "as_labeller(lambda labels, multi_line=True: ['CUSTOM '+v for vs in labels.values() for v in vs])"
tested_on: "ggplot2-python@4.0.2.9000"
