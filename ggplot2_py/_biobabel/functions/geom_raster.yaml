id: ggplot2_py.geom_raster
import_path: ggplot2_py.geom_raster
execution_class: builder
intent:
  - "fast heatmap on a regular grid"
  - "pixel-perfect raster image"
description: |
  Faster specialization of geom_tile; see geom_tile for full failure modes.
  Renders cells via a single bitmap rather than per-rectangle drawing — much
  faster for large grids. REQUIRES evenly-spaced x AND y (constant dx, dy);
  if the spacing is irregular, the render will be wrong or warn. Use
  `geom_tile` for arbitrary grids.
parameters:
  - name: mapping
    type: Mapping
    required: false
    default: null
    description: "Needs x, y, fill. Cells assumed evenly spaced."
  - name: data
    type: DataFrame
    required: false
    default: null
  - name: hjust
    type: float
    required: false
    default: 0.5
  - name: vjust
    type: float
    required: false
    default: 0.5
  - name: interpolate
    type: bool
    required: false
    default: false
    description: "If True, bilinear-interpolate between cell centers (smooth rendering)."
requires: {}
writes: {}
returns_kind: new_object
returns_type: Layer
next:
  - ggplot2_py.scale_fill_viridis_c
  - ggplot2_py.coord_equal
failure_fixes:
  - when: "warning about irregularly spaced x/y or wrong-looking output"
    suggest:
      - "geom_raster requires constant dx, dy. If spacing varies, switch to geom_tile."
examples:
  - "ggplot(grid_df, aes(x='lon', y='lat', fill='temp')) + geom_raster(interpolate=True)"
tested_on: "ggplot2-python@4.0.2.9000"
