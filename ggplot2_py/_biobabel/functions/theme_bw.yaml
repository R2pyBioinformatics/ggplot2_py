id: ggplot2_py.theme_bw
import_path: ggplot2_py.theme_bw
execution_class: builder
intent:
  - "apply black-and-white theme"
  - "publication-style figure with a visible panel border"
  - "drop the default grey background without losing the grid"
description: |
  Build a complete Theme with a white panel, dark border, and faint grey
  grid lines — the classic "dark on light" look used in most journal
  figures.

  Unlike `theme()` (a *partial* override), `theme_bw()` returns a
  *complete* Theme: when added to a plot with `+`, it REPLACES the inherited
  theme rather than merging element-by-element. To tweak individual bits
  AFTER applying `theme_bw`, chain a second `+ theme(...)` — same-element
  later overrides earlier (see concept `plus_accumulation`):

      p + theme_bw() + theme(legend_position="bottom")

  All eight `base_*` / colour parameters propagate to every element via
  the internal `theme_grey()` machinery; pass them at the theme-builder
  level instead of overriding axis_text, axis_title, etc. individually.
parameters:
  - name: base_size
    type: float
    required: false
    default: 11
    description: "Base font size in points; axis text / legend text scale relative to this."
  - name: base_family
    type: str
    required: false
    default: ""
    description: "Base font family. Empty string uses the matplotlib rcParams default."
  - name: header_family
    type: Optional[str]
    required: false
    default: null
    description: "Font family for titles/strips; falls back to base_family when None."
  - name: base_line_size
    type: Optional[float]
    required: false
    default: null
    description: "Line width for axis lines / grids; defaults to base_size/22."
  - name: base_rect_size
    type: Optional[float]
    required: false
    default: null
    description: "Line width for rectangle borders; defaults to base_size/22."
  - name: ink
    type: str
    required: false
    default: black
    description: "Foreground colour (text, axis, ticks)."
  - name: paper
    type: str
    required: false
    default: white
    description: "Background colour for the panel."
  - name: accent
    type: str
    required: false
    default: "#3366FF"
    description: "Accent colour used for highlights (e.g. selected legend keys)."
returns_kind: new_object
returns_type: Theme
next:
  - ggplot2_py.theme
  - ggplot2_py.labs
failure_fixes:
  - when: "Adding theme_bw() AFTER theme(...) wipes out the partial overrides"
    suggest:
      - "Order matters: complete themes (theme_bw) come FIRST, partial theme(...) overrides come AFTER."
      - "Use: p + theme_bw() + theme(legend_position='bottom') — not the reverse."
  - when: "User wrote theme_bw without parentheses (R-style call)"
    suggest:
      - "Python requires parentheses: p + theme_bw(), not p + theme_bw."
  - when: "Per-plot theme works but other plots still grey"
    suggest:
      - "theme_bw() is per-plot. To apply globally, use theme_set(theme_bw()) — but read its global-state caveats first."
examples:
  - "p + theme_bw()"
  - "p + theme_bw(base_size=14) + theme(panel_grid_minor=element_blank())"
  - "p + theme_bw(base_family='Helvetica', ink='#222222')"
tested_on: "ggplot2-python@4.0.2.9000"
