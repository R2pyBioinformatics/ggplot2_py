id: ggplot2_py.guide_axis
import_path: ggplot2_py.guide_axis
execution_class: builder
intent:
  - "fine-tune axis labels: rotate, dodge overlapping ticks, change caps"
description: |
  Build a `GuideAxis` for the x or y axis. Attach via `guides()` or a
  scale's `guide=`:

      ggplot(...) + guides(x=guide_axis(angle=45))
      scale_x_discrete(guide=guide_axis(n_dodge=2))

  Common uses: rotate long category labels (`angle=45`), stagger labels
  into two rows when they collide (`n_dodge=2`), drop overlapping labels
  silently (`check_overlap=True`), or trim the axis line at the data
  extent (`cap='both'`).
parameters:
  - name: title
    type: "str | Waiver"
    required: false
    default: "waiver()"
  - name: theme
    type: "Theme | None"
    required: false
    default: null
  - name: check_overlap
    type: bool
    required: false
    default: false
    description: "Silently drop labels that would overlap."
  - name: angle
    type: "float | Waiver"
    required: false
    default: "waiver()"
    description: "Label rotation in degrees."
  - name: n_dodge
    type: int
    required: false
    default: 1
    description: "Number of rows/columns to stagger labels across."
  - name: minor_ticks
    type: bool
    required: false
    default: false
  - name: cap
    type: "str | bool"
    required: false
    default: "none"
    description: "'none', 'both', 'upper', 'lower'. True ⇒ 'both'; False ⇒ 'none'."
  - name: order
    type: int
    required: false
    default: 0
  - name: position
    type: "str | Waiver"
    required: false
    default: "waiver()"
requires: {}
writes: {}
returns_kind: new_object
returns_type: Guide
next:
  - ggplot2_py.guides
  - ggplot2_py.scale_x_discrete
failure_fixes:
  - when: "long x-axis labels overlap"
    suggest:
      - "Either rotate: guides(x=guide_axis(angle=45)), or stagger: guides(x=guide_axis(n_dodge=2))."
  - when: "`cap` must be one of 'none','both','upper','lower'"
    suggest:
      - "Pass one of those strings, or True/False as shorthand for 'both'/'none'."
  - when: "want secondary axes"
    suggest:
      - "guide_axis configures one axis; a secondary axis is built by passing sec_axis=dup_axis() to the scale, then guide_axis can theme it."
examples:
  - "guides(x=guide_axis(angle=45))"
  - "guides(x=guide_axis(n_dodge=2, check_overlap=True))"
  - "scale_x_discrete(guide=guide_axis(cap='both'))"
tested_on: "ggplot2-python@4.0.2.9000"
