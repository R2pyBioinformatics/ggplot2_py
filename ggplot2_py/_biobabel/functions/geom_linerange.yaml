id: ggplot2_py.geom_linerange
import_path: ggplot2_py.geom_linerange
execution_class: builder
intent:
  - "vertical range bars without horizontal caps"
  - "uncapped error bars / interval lines"
description: |
  Like geom_errorbar without horizontal caps; see geom_errorbar for full failure modes.
  Draws a vertical line at each x from `ymin` to `ymax`. Use this when caps
  add visual clutter or when you'll add a midpoint via `geom_point` (which is
  the geom_pointrange combo).
parameters:
  - name: mapping
    type: Mapping
    required: false
    default: null
    description: "Needs x, ymin, ymax."
  - name: data
    type: DataFrame
    required: false
    default: null
  - name: stat
    type: str
    required: false
    default: identity
  - name: position
    type: str
    required: false
    default: identity
  - name: orientation
    type: "str | None"
    required: false
    default: null
requires: {}
writes: {}
returns_kind: new_object
returns_type: Layer
next:
  - ggplot2_py.geom_point
  - ggplot2_py.facet_wrap
failure_fixes:
  - when: "blank — only y mapped"
    suggest:
      - "geom_linerange needs ymin AND ymax mapped; map both or use geom_pointrange for midpoint+range."
examples:
  - "geom_linerange(aes(x='gene', ymin='lo', ymax='hi'))"
tested_on: "ggplot2-python@4.0.2.9000"
