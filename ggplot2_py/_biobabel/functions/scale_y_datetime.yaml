id: ggplot2_py.scale_y_datetime
import_path: ggplot2_py.scale_y_datetime
execution_class: builder
intent:
  - "datetime / POSIXct y axis (sub-day resolution)"
description: |
  y-axis mirror of scale_x_datetime; see scale_x_datetime for behaviour /
  failure modes (strftime format codes, tz handling, limits-filters-data).
  Note: the y variant in ggplot2-python does NOT expose `date_breaks` /
  `date_labels` kwargs — pass `breaks=` / `labels=` directly.
parameters:
  - name: "**kwargs"
    type: "same shape as scale_y_continuous"
    required: false
    default: null
returns_kind: new_object
returns_type: Scale
next:
  - ggplot2_py.scale_x_datetime
  - ggplot2_py.scale_y_date
failure_fixes:
  - when: "tz-aware timestamps render shifted hours from expected"
    suggest:
      - "Normalise tz first: df['t'] = df['t'].dt.tz_convert('UTC')."
examples:
  - "p + scale_y_datetime(name='Timestamp')"
tested_on: "ggplot2-python@4.0.2.9000"
