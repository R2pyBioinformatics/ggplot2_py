id: ggplot2_py.geom_tile
import_path: ggplot2_py.geom_tile
execution_class: builder
intent:
  - "heatmap of fill values"
  - "rectangular tiles on an arbitrary x/y grid"
description: |
  Draw a rectangle centered at each `(x, y)` with optional per-tile `width`
  and `height` aesthetics. Use `geom_tile` for general heatmaps where
  rows/columns are categorical or unevenly spaced. If your data lies on a
  regular grid (constant dx, dy across all cells), `geom_raster` is
  considerably faster and renders the same picture. Accumulates via `+`
  (see `ggplot2_py.plus_accumulation`).
parameters:
  - name: mapping
    type: Mapping
    required: false
    default: null
    description: "Needs x and y; map fill to color the tiles. width/height are also aesthetics, not direct args."
  - name: data
    type: DataFrame
    required: false
    default: null
  - name: stat
    type: str
    required: false
    default: identity
  - name: position
    type: str
    required: false
    default: identity
  - name: na_rm
    type: bool
    required: false
    default: false
requires: {}
writes: {}
returns_kind: new_object
returns_type: Layer
next:
  - ggplot2_py.scale_fill_viridis_c
  - ggplot2_py.scale_fill_gradient2
  - ggplot2_py.coord_equal
  - ggplot2_py.theme_minimal
failure_fixes:
  - when: "tiles have gaps or overlap unpredictably"
    suggest:
      - "Set per-row width/height via aes(width='w', height='h'); default assumes the resolution of x/y."
      - "If grid is regular and you want pixel-perfect rendering, switch to geom_raster."
  - when: "no color visible — tiles all the default gray"
    suggest:
      - "Map fill via aes(fill='value'); a constant fill outside aes() works too but loses the legend."
  - when: "tiles look squashed in non-square panels"
    suggest:
      - "Add coord_equal() (or coord_fixed()) to enforce 1:1 aspect ratio."
examples:
  - "ggplot(df, aes(x='gene', y='sample', fill='log2fc')) + geom_tile() + scale_fill_gradient2()"
  - "geom_tile(aes(width='w', height='h'))"
tested_on: "ggplot2-python@4.0.2.9000"
