id: ggplot2_py.scale_x_time
import_path: ggplot2_py.scale_x_time
execution_class: builder
intent:
  - "hms / timedelta x axis (duration since some origin)"
  - "elapsed-time plotting"
description: |
  X scale for *duration-typed* data: hms (R hms) / `pd.Timedelta` /
  `datetime.timedelta` / numpy `timedelta64` — values representing elapsed
  time, NOT absolute timestamps.

  In ggplot2-python this is currently an alias for `scale_x_datetime`: it
  shares the same `date_breaks` / `date_labels` kwargs and internally uses
  `transform_time()`. Reach for it when your x column is "minutes since start
  of recording", "age", "session duration", etc.

  The `limits=` filtering pitfall (see `ggplot2_py.scale_x_continuous`)
  applies here too.
parameters:
  - name: name
    type: "str | Waiver | None"
    required: false
    default: null
  - name: breaks
    type: "array-like | callable | None | Waiver"
    required: false
    default: null
  - name: date_breaks
    type: "str | None"
    required: false
    default: null
    description: 'Interval string e.g. "30 sec", "5 min", "1 hour".'
  - name: labels
    type: "array-like | callable | None | Waiver"
    required: false
    default: null
  - name: date_labels
    type: "str | None"
    required: false
    default: null
    description: 'strftime-style format applied to the duration as hh:mm:ss.'
  - name: minor_breaks
    type: "array-like | callable | None | Waiver"
    required: false
    default: null
  - name: limits
    type: "tuple[timedelta, timedelta] | None"
    required: false
    default: null
  - name: expand
    type: "array-like | Waiver"
    required: false
    default: null
  - name: oob
    type: "callable | None"
    required: false
    default: null
  - name: guide
    type: "str | Guide | Waiver"
    required: false
    default: null
  - name: position
    type: str
    required: false
    default: bottom
  - name: sec_axis
    type: "AxisSecondary | Waiver | None"
    required: false
    default: null
returns_kind: new_object
returns_type: Scale
next:
  - ggplot2_py.scale_x_datetime
failure_fixes:
  - when: "values plot at epoch-1970 region — column is datetime not duration"
    suggest:
      - "Use scale_x_datetime for absolute timestamps. scale_x_time is for *elapsed* time (timedelta-typed)."
  - when: "x is numeric seconds — ticks render as raw numbers, no h:m:s"
    suggest:
      - "Cast first: df['t'] = pd.to_timedelta(df['secs'], unit='s')."
examples:
  - "p + scale_x_time(date_breaks='5 min', date_labels='%M:%S')"
  - "p + scale_x_time(name='Time since onset')"
tested_on: "ggplot2-python@4.0.2.9000"
