id: ggplot2_py.theme_grey
import_path: ggplot2_py.theme_grey
execution_class: builder
intent:
  - "ggplot2's default theme — grey panel with white gridlines"
  - "rarely called explicitly (it is what you already get)"
description: |
  The classic ggplot2 default: grey panel background with white major
  and minor grid lines. Usually you do NOT call this explicitly — it is
  the theme every fresh `ggplot()` already inherits. Call it when you
  need to RESTORE the default after a previous `theme_set(theme_bw())`
  (or similar): `theme_set(theme_grey())`. Same builder contract as
  `theme_bw`.

  Note: `theme_gray` is an alias of `theme_grey` (US spelling).
parameters:
  - name: base_size
    type: float
    required: false
    default: 11
  - name: base_family
    type: str
    required: false
    default: ""
  - name: header_family
    type: Optional[str]
    required: false
    default: null
  - name: base_line_size
    type: Optional[float]
    required: false
    default: null
  - name: base_rect_size
    type: Optional[float]
    required: false
    default: null
  - name: ink
    type: str
    required: false
    default: black
  - name: paper
    type: str
    required: false
    default: white
  - name: accent
    type: str
    required: false
    default: "#3366FF"
returns_kind: new_object
returns_type: Theme
next:
  - ggplot2_py.theme
examples:
  - "theme_set(theme_grey())  # restore default after a prior theme_set"
tested_on: "ggplot2-python@4.0.2.9000"
