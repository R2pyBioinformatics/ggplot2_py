id: ggplot2_py.ggplot
import_path: ggplot2_py.ggplot
execution_class: builder
intent:
  - "start a new ggplot2 plot"
  - "create a layered graphic"
description: |
  Construct a GGPlot builder seeded with a data frame and default aesthetics.
  Subsequent `+` operations layer on geoms, stats, scales, facets, coords,
  and themes. The plot is not rendered until print() / __repr__ / .draw().
parameters:
  - name: data
    type: DataFrame
    required: false
    default: null
    description: "Default data for every layer; layers can override their own."
  - name: mapping
    type: Mapping
    required: false
    default: null
    description: "Default aes mapping; provided here so layers don't have to repeat it."
requires: {}
writes: {}
returns_kind: new_object
returns_type: GGPlot
next:
  - ggplot2_py.geom_point
  - ggplot2_py.geom_line
  - ggplot2_py.geom_bar
  - ggplot2_py.geom_smooth
  - ggplot2_py.facet_wrap
failure_fixes:
  - when: "AttributeError on attribute that looks like a column name (e.g. p.displ)"
    suggest:
      - "Aesthetic columns are strings inside aes(): aes(x='displ'), not p.displ."
  - when: "TypeError: aes() got positional argument"
    suggest:
      - "Python aes() requires keyword args: aes(x='col', y='col'), not aes('col1', 'col2')."
examples:
  - "ggplot(mpg, aes(x='displ', y='hwy')) + geom_point()"
tested_on: "ggplot2-python@4.0.2.9000"
