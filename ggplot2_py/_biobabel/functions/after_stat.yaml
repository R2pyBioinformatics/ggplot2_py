id: ggplot2_py.after_stat
import_path: ggplot2_py.after_stat
execution_class: stateless
intent:
  - "inside aes(), refer to a column computed by the stat layer instead of the raw data"
  - "make geom_histogram show density, geom_bar show proportion, geom_density show count, etc."
description: |
  Return an `AfterStat` sentinel wrapping a stat-computed variable name (or
  a callable). Used inside `aes()` to bind an aesthetic to a column that
  exists ONLY after the stat has run — e.g. `count`, `density`, `prop`,
  `scaled`, `level` — not to anything in the original data frame.

  Without `after_stat`, `aes(y='density')` would look for a column named
  `'density'` in the data and fail. With `after_stat`,
  `aes(y=after_stat('density'))` is resolved at stat-completion time, when
  the bin's density column actually exists.

  Pipeline phase: stat runs → `after_stat(name)` resolves against the stat
  output → scale mapping → `after_scale(...)` resolves → draw.

  R's `..count..` / `..density..` double-dot syntax is the deprecated
  ancestor of this. ggplot2-python only supports the `after_stat(...)`
  wrapper.

  The argument can be:
    - a string: the name of a stat-computed column (`'count'`, `'density'`,
      `'prop'`, `'scaled'`, etc.).
    - a callable `f(stat_df) -> array`: a one-shot transform of the
      post-stat data (rare; used for normalized variants).
parameters:
  - name: x
    type: "str | Callable[[DataFrame], ArrayLike]"
    required: true
    default: null
    description: "Name of a stat-computed column, or a callable f(stat_df) -> array."
requires: {}
writes: {}
returns_kind: value
returns_type: AfterStat
next:
  - ggplot2_py.aes
  - ggplot2_py.geom_histogram
  - ggplot2_py.geom_bar
  - ggplot2_py.geom_density
failure_fixes:
  - when: "want y to be density instead of count in geom_histogram"
    suggest:
      - "Use aes(y=after_stat('density')): geom_histogram(aes(x='hwy', y=after_stat('density')))."
  - when: "want bar heights as proportions"
    suggest:
      - "Map y to after_stat('prop') AND set group=1 (or another constant) so prop is computed across all bars: geom_bar(aes(y=after_stat('prop'), group=1))."
  - when: "KeyError or 'column not found' on a stat name like 'count' or 'density'"
    suggest:
      - "These names live only post-stat. Wrap with after_stat: aes(y=after_stat('count')), not aes(y='count')."
  - when: "TypeError: AfterStat expects a str or callable"
    suggest:
      - "Pass a string (column name) or a callable f(df) -> array. Numbers, lists, and arrays are not valid."
  - when: "used old R-style ..count.. or stat(count) syntax"
    suggest:
      - "Replace ..count.. and stat(count) with after_stat('count'). The double-dot/stat() forms are not parsed by ggplot2-python."
examples:
  - "geom_histogram(aes(x='hwy', y=after_stat('density')))"
  - "geom_bar(aes(y=after_stat('prop'), group=1))"
  - "geom_density(aes(y=after_stat('count')))"
  - "after_stat(lambda d: d['count'] / d['count'].max())"
tested_on: "ggplot2-python@4.0.2.9000"
