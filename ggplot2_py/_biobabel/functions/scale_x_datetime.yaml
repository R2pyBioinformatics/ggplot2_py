id: ggplot2_py.scale_x_datetime
import_path: ggplot2_py.scale_x_datetime
execution_class: builder
intent:
  - "datetime / POSIXct x axis (sub-day resolution)"
  - "format timestamp tick labels via strftime"
description: |
  Sibling of `scale_x_date` for `datetime.datetime` / `pd.Timestamp` /
  numpy datetime64 data — i.e. values with a *time of day*, not just a date.
  Internally `scale_x_continuous(transform=transform_time())`.

  The date-aware kwargs are the same: `date_breaks`, `date_labels`,
  `minor_breaks` (note: no `date_minor_breaks` here — pass a callable or list
  via `minor_breaks=` instead). Strftime examples that often matter at
  datetime resolution:

  - `"%Y-%m-%d %H:%M"` — minute precision
  - `"%H:%M"` — within-day series
  - `"%b %d"` — multi-day, no year

  The `limits=` filtering pitfall (see `ggplot2_py.scale_x_continuous`)
  applies here too.
parameters:
  - name: name
    type: "str | Waiver | None"
    required: false
    default: null
  - name: breaks
    type: "array-like | callable | None | Waiver"
    required: false
    default: null
  - name: date_breaks
    type: "str | None"
    required: false
    default: null
    description: 'Interval string e.g. "1 hour", "15 min", "1 day".'
  - name: labels
    type: "array-like | callable | None | Waiver"
    required: false
    default: null
  - name: date_labels
    type: "str | None"
    required: false
    default: null
    description: 'strftime format e.g. "%H:%M", "%Y-%m-%d %H:%M".'
  - name: minor_breaks
    type: "array-like | callable | None | Waiver"
    required: false
    default: null
  - name: limits
    type: "tuple[datetime, datetime] | None"
    required: false
    default: null
  - name: expand
    type: "array-like | Waiver"
    required: false
    default: null
  - name: oob
    type: "callable | None"
    required: false
    default: null
  - name: guide
    type: "str | Guide | Waiver"
    required: false
    default: null
  - name: position
    type: str
    required: false
    default: bottom
  - name: sec_axis
    type: "AxisSecondary | Waiver | None"
    required: false
    default: null
returns_kind: new_object
returns_type: Scale
next:
  - ggplot2_py.scale_x_date
  - ggplot2_py.scale_x_time
failure_fixes:
  - when: "x column is a date (no time) — ticks show 00:00:00 spam"
    suggest:
      - "Use scale_x_date() for date-only data, or strip time from your formatter: date_labels='%Y-%m-%d'."
  - when: "tz-aware timestamps render shifted from expected hours"
    suggest:
      - "Normalise timezone before plotting: df['t'] = df['t'].dt.tz_convert('UTC') (or your target zone). The scale doesn't reinterpret tz."
  - when: "date_breaks='15 min' raises invalid interval"
    suggest:
      - 'Use unit names: "15 min" or "15 mins". The "m" alone is ambiguous with month.'
examples:
  - "p + scale_x_datetime(date_breaks='1 hour', date_labels='%H:%M')"
  - "p + scale_x_datetime(date_breaks='1 day', date_labels='%b %d')"
tested_on: "ggplot2-python@4.0.2.9000"
