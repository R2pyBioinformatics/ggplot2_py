id: ggplot2_py.scale_color_viridis_c
import_path: ggplot2_py.scale_color_viridis_c
execution_class: builder
intent:
  - "continuous viridis color ramp for numeric data"
  - "perceptually uniform, colorblind-safe gradient"
description: |
  **Continuous** viridis color scale — the `_c` suffix means continuous. Maps a
  numeric column smoothly through the viridis ramp. Use this when the column
  bound to `color=`/`fill=` is numeric (int/float).

  This is one half of the most error-prone pair in ggplot2: pick `_c` for
  numeric data, `_d` (`scale_color_viridis_d`) for factor / categorical data.
  Wrong suffix is silent in some cases and produces an opaque error in others
  (see `failure_fixes`).

  Internally wraps `pal_gradient_n` over the viridis palette samples — i.e.
  the discrete palette is interpolated to a continuous ramp at draw time. See
  `scales.Palette` for the discrete-vs-continuous palette contract.
parameters:
  - name: option
    type: "str"
    required: false
    default: "D"
    description: |
      Viridis variant. 'A' = magma, 'B' = inferno, 'C' = plasma, 'D' = viridis
      (default), 'E' = cividis, 'F' = rocket, 'G' = mako, 'H' = turbo.
  - name: begin
    type: "float"
    required: false
    default: 0.0
    description: "Trim the dark end of the ramp; 0–1."
  - name: end
    type: "float"
    required: false
    default: 1.0
    description: "Trim the bright end of the ramp; 0–1."
  - name: direction
    type: "int"
    required: false
    default: 1
    description: "+1 = dark→bright, -1 = reverse."
  - name: alpha
    type: "float"
    required: false
    default: 1.0
    description: "Color alpha applied across the ramp."
  - name: name
    type: "str | None"
    required: false
    default: null
    description: "Legend / colorbar title."
  - name: limits
    type: "tuple[float, float] | None"
    required: false
    default: null
    description: "Data range mapped to [begin, end]. Values outside become `na_value` unless `oob=` is set."
  - name: breaks
    type: "list | callable | None"
    required: false
    default: null
    description: "Tick positions on the colorbar."
  - name: labels
    type: "callable | list | None"
    required: false
    default: null
    description: "Tick formatter / labels."
  - name: na_value
    type: "str"
    required: false
    default: "grey50"
    description: "Color for NA / out-of-range. Python uses `na_value=` (not R's `na.value=`)."
  - name: guide
    type: "str | Guide"
    required: false
    default: "colourbar"
    description: "Default 'colourbar' for continuous scales; use 'legend' for a discretized legend."
  - name: aesthetics
    type: "str | list[str]"
    required: false
    default: "colour"
    description: "'color' / 'colour' are aliases."
requires: {}
writes: {}
returns_kind: new_object
returns_type: Scale
next: []
failure_fixes:
  - when: "Error: Discrete value supplied to continuous scale"
    suggest:
      - "Your column is categorical — use `scale_color_viridis_d()` instead (note the `_d` suffix)."
    explanation: "The _c suffix means continuous; it refuses factor / string columns. The _c vs _d gotcha is the #1 viridis bug."
  - when: "the colorbar collapses to a few stripes (looks discrete)"
    suggest:
      - "You probably mapped an integer-coded category. Convert via `df['x'] = df['x'].astype('category')` and switch to `scale_color_viridis_d()`, OR cast to float if it really is numeric."
  - when: "TypeError: got an unexpected keyword argument 'na.value'"
    suggest:
      - "Use `na_value=` — Python uses underscores."
  - when: "ramp looks too dark / too washed out at the extremes"
    suggest:
      - "Trim with `begin=0.1, end=0.9` to avoid the very dark / very pale endpoints."
examples:
  - "p + scale_color_viridis_c()  # numeric column on color="
  - "p + scale_color_viridis_c(option='magma', direction=-1)"
tested_on: "ggplot2-python@4.0.2.9000"
