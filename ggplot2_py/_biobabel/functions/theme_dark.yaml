id: ggplot2_py.theme_dark
import_path: ggplot2_py.theme_dark
execution_class: builder
intent:
  - "dark-panel variant of theme_light"
  - "make light/bright geoms (e.g. fluorescent colours) pop"
description: |
  Complete Theme with a dark panel background — the dark cousin of
  `theme_light`. Use when foreground geoms are bright or fluorescent
  (e.g. neon-coloured points on a dark slide background). Same builder
  contract as `theme_bw` (replaces inherited theme; chain `+ theme(...)`
  afterward).
parameters:
  - name: base_size
    type: float
    required: false
    default: 11
  - name: base_family
    type: str
    required: false
    default: ""
  - name: header_family
    type: Optional[str]
    required: false
    default: null
  - name: base_line_size
    type: Optional[float]
    required: false
    default: null
  - name: base_rect_size
    type: Optional[float]
    required: false
    default: null
  - name: ink
    type: str
    required: false
    default: black
  - name: paper
    type: str
    required: false
    default: white
  - name: accent
    type: str
    required: false
    default: "#3366FF"
returns_kind: new_object
returns_type: Theme
next:
  - ggplot2_py.theme
examples:
  - "p + theme_dark()"
tested_on: "ggplot2-python@4.0.2.9000"
