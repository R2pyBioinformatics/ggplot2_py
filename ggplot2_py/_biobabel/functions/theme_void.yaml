id: ggplot2_py.theme_void
import_path: ggplot2_py.theme_void
execution_class: builder
intent:
  - "strip all chrome — no axes, no grid, no panel"
  - "ideal for maps, treemaps, networks, or pure-geom illustrations"
description: |
  Completely empty Theme: no axis text, no ticks, no grid, no panel
  background. Same builder contract as `theme_bw` — replaces inherited
  theme on `+`, chain `+ theme(...)` afterward to add back any element
  you actually want. Common pairing: maps with `coord_sf()` or
  `geom_polygon()` where axis ticks are meaningless.
parameters:
  - name: base_size
    type: float
    required: false
    default: 11
  - name: base_family
    type: str
    required: false
    default: ""
  - name: header_family
    type: Optional[str]
    required: false
    default: null
  - name: base_line_size
    type: Optional[float]
    required: false
    default: null
  - name: base_rect_size
    type: Optional[float]
    required: false
    default: null
  - name: ink
    type: str
    required: false
    default: black
  - name: paper
    type: Optional[str]
    required: false
    default: null
  - name: accent
    type: str
    required: false
    default: "#3366FF"
returns_kind: new_object
returns_type: Theme
next:
  - ggplot2_py.theme
examples:
  - "p + theme_void()"
  - "ggplot(map_df) + geom_polygon(aes('long','lat',group='group')) + coord_sf() + theme_void()"
tested_on: "ggplot2-python@4.0.2.9000"
